steps:
  # 1. Build Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/autoqa-backend', '-f', 'docker/backend/Dockerfile', './backend']
    id: 'build-backend'

  # 2. Build Frontend Image (passing the backend URL as a build arg)
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/autoqa-frontend'
      - '-f'
      - 'docker/frontend/Dockerfile'
      - '--build-arg'
      - 'REACT_APP_API_URL=$_BACKEND_URL'
      - './frontend'
    id: 'build-frontend'

  # 3. Push Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/autoqa-backend']
    id: 'push-backend'

  # 4. Push Frontend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/autoqa-frontend']
    id: 'push-frontend'

  # 5. Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'autoqa-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/autoqa-backend'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
    id: 'deploy-backend'

  # 6. Deploy Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'autoqa-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/autoqa-frontend'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
    id: 'deploy-frontend'

images:
  - 'gcr.io/$PROJECT_ID/autoqa-backend'
  - 'gcr.io/$PROJECT_ID/autoqa-frontend'

substitutions:
  _REGION: us-central1
  _BACKEND_URL: ''
